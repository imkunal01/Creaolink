<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar" id="connection-status">
    Not linked — click Link Project
  </div>

  <!-- Action buttons -->
  <div class="button-group">
    <button id="btn-link" onclick="linkProject()">Link Project</button>
    <button id="btn-sync" onclick="syncTimeline()" disabled>Sync Timeline</button>
    <button id="btn-unlink" onclick="unlinkProject()" class="danger hidden">
      Unlink Project
    </button>
  </div>

  <!-- Inline link form (hidden by default) -->
  <div class="link-form hidden" id="link-form">
    <label>Project ID</label>
    <input type="text" id="input-project-id" placeholder="proj_123" autocomplete="off"/>
    <label>Sync Token</label>
    <input type="password" id="input-sync-token" placeholder="secure_token_abc" />
    <div class="form-actions">
      <button onclick="confirmLink()">Confirm</button>
      <button onclick="cancelLink()">Cancel</button>
    </div>
  </div>

  <!-- Status message area -->
  <div class="status-message" id="status-message"></div>

  <script src="main.js"></script>
</body>
</html>
